<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17150F">
<title>Family Food · Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#ECF400; --brand-deep:#CDD400; --brand-soft:#F9FBD0;
  --ink:#17150F; --ink-2:#3A362B; --ink-soft:#6E695B; --ink-faint:#A8A292;
  --paper:#F6F4EC; --card:#FFFFFF; --line:#E7E3D6; --line-2:#F0ECE0;
  --green:#2F9E68; --green-soft:#E4F2EA; --green-lt:#7BD3A0;
  --red:#D6493B; --red-soft:#FBE8E5; --red-lt:#F0917F;
  --blue:#3E6FB0; --blue-soft:#E9F0F8;
  --shadow:0 1px 2px rgba(23,21,15,.04),0 8px 24px rgba(23,21,15,.06);
  --shadow-lg:0 12px 40px rgba(23,21,15,.2);
  --r:18px; --r-sm:12px; --nav-h:72px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);
  font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px)}
h1,h2,h3{font-family:'Archivo',sans-serif;margin:0;letter-spacing:-.01em}

/* splash */
#splash{position:fixed;inset:0;z-index:100;background:var(--brand);display:grid;place-items:center;
  transition:opacity .5s ease;padding:40px}
#splash img{width:min(74%,320px);animation:pop .6s cubic-bezier(.22,1,.36,1)}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
#splash.gone{opacity:0;pointer-events:none}

/* header */
.hd{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom-left-radius:20px;border-bottom-right-radius:20px}
.hd .brand{display:flex;align-items:center;gap:11px}
.hd .logo{width:40px;height:40px;border-radius:11px;background:var(--brand);overflow:hidden;
  display:grid;place-items:center;box-shadow:0 4px 14px rgba(236,244,0,.3);flex:none}
.hd .logo img{width:112%;height:112%;object-fit:cover}
.hd .brand b{font-family:'Archivo';font-weight:800;font-size:16px;line-height:1;display:block;letter-spacing:-.02em}
.hd .brand span{font-size:10.5px;color:var(--brand);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.hd .today{text-align:right;font-size:10.5px;color:#B9B4A5}
.hd .today b{display:block;color:#fff;font-family:'Archivo';font-size:15px;font-weight:600}

.view{padding:16px 16px 8px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.view.hidden{display:none}

/* hero (brand yellow) */
.hero{background:var(--brand);border-radius:var(--r);padding:20px;box-shadow:0 10px 30px rgba(236,244,0,.28);
  position:relative;overflow:hidden;color:var(--ink)}
.hero .lbl{font-size:12px;color:var(--ink-2);letter-spacing:.05em;text-transform:uppercase;font-weight:700}
.hero .big{font-family:'Archivo';font-weight:800;font-size:44px;line-height:1;margin:6px 0 12px;letter-spacing:-.03em}
.split{display:flex;gap:8px}
.split .s{flex:1;background:var(--ink);color:#fff;border-radius:13px;padding:11px 13px}
.split .s .k{font-size:10.5px;color:#C9C4B5;text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.split .s .v{font-family:'Archivo';font-weight:700;font-size:17px;margin-top:3px}
.split .s.res .v{color:var(--brand)}
.split .s.op .v{color:var(--green-lt)}

.monthrow{display:flex;gap:8px;margin-top:16px}
.monthrow .m{flex:1;text-align:center}
.monthrow .k{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.monthrow .v{font-family:'Archivo';font-weight:800;font-size:16px;margin-top:2px}
.pos{color:var(--green)} .neg{color:var(--red)}

.sec{margin-top:20px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:0 4px 11px}
.sec-h h2{font-size:15px;font-weight:700}
.sec-h .r{font-size:12px;color:var(--ink-faint);font-weight:600}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

.acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.acct{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 13px;position:relative}
.acct.reserva{border-color:var(--brand-deep);background:var(--brand-soft)}
.acct .n{font-size:12px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:6px}
.acct .dot{width:8px;height:8px;border-radius:50%}
.acct .v{font-family:'Archivo';font-weight:700;font-size:18px;margin-top:5px}
.acct .v.zero{color:var(--ink-faint)}
.acct .tag{position:absolute;top:11px;right:11px;font-size:9px;font-weight:700;color:var(--ink);
  background:var(--brand);padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}

.kpi{display:flex;gap:10px}
.kpi .card{flex:1;padding:14px}
.kpi .k{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.kpi .v{font-family:'Archivo';font-weight:800;font-size:22px;margin-top:5px}
.kpi .h{font-size:11px;color:var(--ink-faint);margin-top:3px}

/* rows / items */
.rows{display:flex;flex-direction:column}
.dayh{font-size:11px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:14px 4px 6px}
.item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:transform .08s}
.item:active{transform:scale(.99)}
.ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:none;font-weight:800;font-family:'Archivo'}
.ic.e{background:var(--green-soft);color:var(--green)} .ic.s{background:var(--red-soft);color:var(--red)} .ic.t{background:var(--blue-soft);color:var(--blue)}
.item .mid{flex:1;min-width:0}
.item .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .t2{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.item .amt{font-family:'Archivo';font-weight:700;font-size:15px;text-align:right;flex:none}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}
.b-pend{background:var(--brand-soft);color:var(--ink-2)}

.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-weight:600;
  font-size:12.5px;padding:7px 14px;border-radius:20px;white-space:nowrap;cursor:pointer;font-family:inherit}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* debt / meta hero cards */
.big-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.big-card .k{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.big-card .big{font-family:'Archivo';font-weight:800;font-size:34px;margin:5px 0}
.big-card .cs{font-size:12.5px;color:var(--ink-soft)}
.crow{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;margin-bottom:8px}
.crow .cn{font-weight:600;font-size:14px}
.crow .cs{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.crow .cv{font-family:'Archivo';font-weight:700;font-size:16px;text-align:right}
.st{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
.st.reneg{background:var(--green-soft);color:var(--green)}
.st.aberto{background:var(--brand-soft);color:var(--ink-2)}

/* meta progress */
.prog{height:14px;background:var(--line-2);border-radius:10px;overflow:hidden;margin:12px 0 8px}
.prog > div{height:100%;background:var(--brand);border-radius:10px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.bars{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.bar{}
.bar .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
.bar .top b{font-weight:600} .bar .top span{font-family:'Archivo';font-weight:700;color:var(--ink-2)}
.bar .track{height:9px;background:var(--line-2);border-radius:6px;overflow:hidden}
.bar .track > div{height:100%;border-radius:6px}
.bar.out .track > div{background:var(--red)}
.bar.in .track > div{background:var(--green)}

.note{font-size:12px;color:var(--ink-2);background:var(--brand-soft);border:1px solid var(--brand-deep);
  border-radius:12px;padding:11px 13px;line-height:1.5}
.empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:40px 20px}
.linkbtn{background:none;border:none;color:var(--ink-2);font-weight:700;font-size:12px;cursor:pointer;
  font-family:inherit;text-decoration:underline;text-underline-offset:2px}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(70px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:2px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;padding:8px 4px;z-index:40;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  font-family:inherit;color:var(--ink-faint);font-size:10px;font-weight:700;cursor:pointer;flex:1;padding:8px 0;position:relative;
  transition:all .2s ease;border-radius:12px}
.nav button:active{background:rgba(236,244,0,.1)}
.nav button svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.nav button.on{color:var(--brand)}
.nav button.on svg{stroke-width:2.2;filter:drop-shadow(0 0 10px rgba(236,244,0,.5))}
.nav button.on:after{content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:var(--brand);border-radius:50%;box-shadow:0 0 12px rgba(236,244,0,.6)}
.nav .fab-slot{flex:1;display:flex;justify-content:center;align-items:center;padding:0}
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + 30px + env(safe-area-inset-bottom));
  width:64px;height:64px;border-radius:50%;background:var(--brand);border:4px solid var(--paper);
  box-shadow:0 12px 32px rgba(236,244,0,.6);display:grid;place-items:center;cursor:pointer;z-index:41;transition:all .2s}
.fab:hover{transform:translateX(-50%) scale(1.08);box-shadow:0 16px 40px rgba(236,244,0,.7)}
.fab:active{transform:translateX(-50%) scale(.94)}
.fab svg{width:30px;height:30px;stroke:var(--ink);stroke-width:2.8;fill:none;stroke-linecap:round}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(20,18,12,.5);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--paper);
  border-top-left-radius:24px;border-top-right-radius:24px;z-index:51;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto;
  padding:8px 18px calc(24px + env(safe-area-inset-bottom))}
.sheet.on{transform:translateY(0)}
.grab{width:40px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 6px}
.sheet h2{font-size:18px;font-weight:700;margin:6px 2px 16px}
.seg{display:flex;background:var(--line-2);border-radius:14px;padding:4px;gap:4px;margin-bottom:16px}
.seg button{flex:1;border:none;background:none;font-family:'Archivo';font-weight:700;font-size:13px;
  padding:10px 4px;border-radius:11px;cursor:pointer;color:var(--ink-soft)}
.seg button.on-e{background:var(--green);color:#fff}
.seg button.on-s{background:var(--red);color:#fff}
.seg button.on-t{background:var(--blue);color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:0 2px 6px;text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:var(--card);
  border-radius:12px;padding:13px 14px;font-family:inherit;font-size:15px;color:var(--ink);appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand-deep);box-shadow:0 0 0 3px var(--brand-soft)}
.field.val input{font-family:'Archivo';font-weight:800;font-size:28px;text-align:center;letter-spacing:-.02em}
.two{display:flex;gap:10px}.two .field{flex:1}
.pago-tog{display:flex;gap:8px}
.pago-tog button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:12px;
  font-family:inherit;font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer}
.pago-tog button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.save{width:100%;background:var(--brand);color:var(--ink);border:none;border-radius:14px;padding:16px;
  font-family:'Archivo';font-weight:800;font-size:16px;cursor:pointer;margin-top:6px;box-shadow:0 6px 18px rgba(236,244,0,.5)}
.save:active{background:var(--brand-deep)}
.del{width:100%;background:none;color:var(--red);border:none;padding:14px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;margin-top:4px}
select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%236E695B' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center;padding-right:36px!important}

.toast{position:fixed;bottom:calc(var(--nav-h) + 20px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;
  z-index:60;opacity:0;transition:.3s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hint{font-size:11.5px;color:var(--ink-faint);text-align:center;padding:12px 20px 0;line-height:1.5}
.reset{display:block;margin:18px auto 4px;background:none;border:none;color:var(--ink-faint);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit}
</style>
</head>

const todayISO = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const val = t => t.tipo==='Entrada'? t.entrada : t.tipo==='Saída'? t.saida : (t.entrada||t.saida);
const acctColor = n => ({Dinheiro:'#2F9E68',Nubank:'#8A2BE2',C6:'#111',Itaú:'#EC7000',Inter:'#FF7A00',Stone:'#00A868','Mercado Pago':'#00AEEF',Magazine:'#0086FF'}[n]||'#CDD400');

const CARD_BY_CAT={'Parcela Inter':'Inter','Parcela Nubank':'Nubank Empresa','Pagamento Stone':'Stone','Pagamento Mercado Pago':'Mercado Pago','Pagamento Magazine':'Magazine Luiza','Pagamento C6':'C6 Empresa'};
function compute(){
  const NAO_VENDA=['Empréstimo','Renegociação','Aporte','Estorno'];
  const bal={}; DB.contas.forEach(c=>bal[c.nome]=c.inicial);
  const cardPaid={};
  let entradas=0,receitaVenda=0,saidasPagas=0,transfIn=0,transfOut=0,retiradas=0,dividaPaga=0,custosOp=0;
  DB.txs.forEach(t=>{
    if(t.tipo==='Entrada'){ if(bal[t.conta]!=null)bal[t.conta]+=t.entrada; entradas+=t.entrada;
        if(!NAO_VENDA.includes(t.categoria||'')) receitaVenda+=t.entrada; }
    else if(t.tipo==='Saída'){ if(t.pago==='Pago'){ if(bal[t.conta]!=null)bal[t.conta]-=t.saida; saidasPagas+=t.saida;
        const cat=t.categoria||'';
        const isDivida = /^Parcela/.test(cat) || /^Pagamento/.test(cat);
        if(cat==='Pró-labore') retiradas+=t.saida;
        else if(isDivida){ dividaPaga+=t.saida; const cn=CARD_BY_CAT[cat]; if(cn) cardPaid[cn]=(cardPaid[cn]||0)+t.saida; }
        else custosOp+=t.saida;
      } }
    else if(t.tipo==='Transferência'){ const v=val(t);
      if(t.conta && bal[t.conta]!=null){ bal[t.conta]+=v; transfIn+=v; }
      if(t.contaOrigem && bal[t.contaOrigem]!=null){ bal[t.contaOrigem]-=v; transfOut+=v; }
    }
  });
  const total=Object.values(bal).reduce((a,b)=>a+b,0);
  const reserva=bal['Itaú']||0, operacional=total-reserva;
  const recebido=entradas+transfIn, pago=saidasPagas+transfOut, sobra=recebido-pago;
  const lucroOp=receitaVenda-custosOp;
  return {bal,total,vendas:entradas,entradas,receitaVenda,saidasPagas,reserva,operacional,cardPaid,
          recebido,pago,sobra,transfIn,transfOut,retiradas,dividaPaga,custosOp,lucroOp,
          resultado:entradas-saidasPagas};
}
function cardSaldo(cd,c){ return Math.max(0, cd.saldo-((c.cardPaid&&c.cardPaid[cd.nome])||0)); }
function cardsTotal(c){ let d=0,parc=0; DB.cartoes.forEach(cd=>{d+=cardSaldo(cd,c); if(cd.valorParcela)parc+=cd.valorParcela;}); return {divida:d,parcelas:parc}; }

/* ---------- Extrato ---------- */
let filt='Todos';
function renderExtrato(){
  const tipos=['Todos','Entrada','Saída','Transferência'];
  const chips=tipos.map(t=>`<button class="chip ${t===filt?'on':''}" data-filt="${t}">${t}</button>`).join('');
  let list=DB.txs.map((t,i)=>({...t,_i:i})).filter(t=>filt==='Todos'||t.tipo===filt)
    .sort((a,b)=>(b.data||'').localeCompare(a.data||'')||b._i-a._i);
  let html='',cur=null;
  if(!list.length) html='<div class="empty">Nenhum lançamento neste filtro.</div>';
  list.forEach(t=>{
    if(t.data!==cur){cur=t.data;html+=`<div class="dayh">${fmtDlong(cur)}</div>`;}
    const cls=t.tipo==='Entrada'?'e':t.tipo==='Saída'?'s':'t';
    const ico=t.tipo==='Entrada'?'+':t.tipo==='Saída'?'−':'⇄';
    const sign=t.tipo==='Entrada'?'+':t.tipo==='Saída'?'−':'';
    const col=t.tipo==='Entrada'?'var(--green)':t.tipo==='Saída'?'var(--red)':'var(--blue)';
    const pend=(t.tipo==='Saída'&&t.pago!=='Pago')?'<span class="badge b-pend">Pendente</span>':'';
    const sub=t.tipo==='Transferência'&&t.contaOrigem?`${t.contaOrigem} → ${t.conta}`:(t.conta+(t.desc?' · '+t.desc:''));
    html+=`<div class="item" data-edit="${t._i}"><div class="ic ${cls}">${ico}</div>
      <div class="mid"><div class="t1">${t.categoria||t.desc||'Transferência'}${pend}</div><div class="t2">${sub}</div></div>
      <div class="amt" style="color:${col}">${sign}${BRL0(val(t))}</div></div>`;
  });
  document.getElementById('v-extrato').innerHTML=`
    <div class="sec-h" style="margin-top:4px"><h2>Extrato</h2><span class="r">${DB.txs.length} lançamentos</span></div>
    <div class="chips">${chips}</div><div class="rows">${html}</div>`;
}

let cform=null;
function openCartSheet(idx){
  const cd=idx!=null?{...DB.cartoes[idx]}:{nome:'',status:'Em aberto',saldo:0,entrada:0,parcelas:0,valorParcela:0,venc:'',obs:''};
  cform={...cd,_edit:idx};
  document.getElementById('sheet').innerHTML=`
    <div class="grab"></div>
    <h2>${idx!=null?'Editar cartão':'Novo cartão'}</h2>
    <div class="field"><label>Nome do cartão</label><input id="cn" type="text" placeholder="ex: Inter" value="${(cform.nome||'').replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>Status</label>
      <select id="cs">
        <option ${cform.status==='Renegociado'?'selected':''}>Renegociado</option>
        <option ${cform.status==='Em aberto'?'selected':''}>Em aberto</option>
        <option>Quitado</option>
      </select>
    </div>
    <div class="field val"><label>Saldo atual (R$)</label><input id="csa" type="text" inputmode="decimal" placeholder="0,00" value="${cform.saldo?String(cform.saldo).replace('.',','):''}"></div>
    <div class="two">
      <div class="field"><label>Parcelas</label><input id="cpa" type="number" min="0" placeholder="0" value="${cform.parcelas||0}"></div>
      <div class="field"><label>Valor/parcela (R$)</label><input id="cpv" type="text" inputmode="decimal" placeholder="0,00" value="${cform.valorParcela?String(cform.valorParcela).replace('.',','):''}"></div>
    </div>
    <div class="field"><label>Vencimento (dia do mês)</label><input id="cvn" type="text" placeholder="ex: 20" value="${cform.venc||''}"></div>
    <div class="field"><label>Observação</label><input id="co" type="text" placeholder="ex: renovação mês que vem" value="${(cform.obs||'').replace(/"/g,'&quot;')}"></div>
    <button class="save" id="csave">${idx!=null?'Salvar alterações':'Criar cartão'}</button>
    ${idx!=null?'<button class="del" id="cdel">Excluir cartão</button>':''}
  `;
  document.getElementById('scrim').classList.add('on');
  document.getElementById('sheet').classList.add('on');
  document.getElementById('csave').onclick=saveCart;
  const d=document.getElementById('cdel'); if(d)d.onclick=deleteCart;
}

async function saveCart(){
  const g=id=>document.getElementById(id).value;
  const nome=g('cn');
  if(!nome){toast('Nome do cartão obrigatório');return;}
  const saldo=(()=>{let r=String(g('csa')).trim();return parseFloat(r.includes(',')? r.replace(/\./g,'').replace(',','.') : r)||0;})();
  const parc=parseInt(g('cpa'))||0;
  const valPar=(()=>{let r=String(g('cpv')).trim();return parseFloat(r.includes(',')? r.replace(/\./g,'').replace(',','.') : r)||0;})();
  const rec={nome,status:g('cs'),saldo,parcelas:parc,valorParcela:valPar,venc:g('cvn'),obs:g('co')||''};
  if(cform._edit!=null)DB.cartoes[cform._edit]=rec; else DB.cartoes.push(rec);
  await save();closeSheet();toast(cform._edit!=null?'Cartão atualizado ✓':'Cartão criado ✓');renderCartoes();
}

async function deleteCart(){
  if(cform._edit==null)return;
  if(!confirm('Tem certeza que quer excluir esse cartão?'))return;
  DB.cartoes.splice(cform._edit,1);
  await save();closeSheet();toast('Cartão excluído');renderCartoes();
}

/* ---------- Metas ---------- */
function renderMetas(){
  const c=compute();
  const meta=DB.meta||{valor:109315,mes:'Julho/2026'};
  const vendasReais=(DB.vendas||[]).reduce((a,v)=>a+(v.valor||0),0);   // vendas cheias (Consumer, referência)
  const pct=Math.min(100, meta.valor? vendasReais/meta.valor*100 : 0);
  const falta=Math.max(0, meta.valor-vendasReais);
  // dias decorridos: pela última data de vendas registrada (senão, pelos lançamentos)
  let lastDay=0; (DB.vendas||[]).forEach(v=>{const d=parseD(v.data);if(d)lastDay=Math.max(lastDay,d.getDate());});
  if(!lastDay) DB.txs.forEach(t=>{const d=parseD(t.data);if(d)lastDay=Math.max(lastDay,d.getDate());});
  lastDay=Math.max(1,lastDay);
  const diasRest=Math.max(1,31-lastDay), ritmo=vendasReais/lastDay, precisa=falta/diasRest;
  const noPace = ritmo>=precisa;

  const outMap={};
  DB.txs.forEach(t=>{ if(t.tipo==='Saída')outMap[t.categoria||'Outros']=(outMap[t.categoria||'Outros']||0)+t.saida; });
  const outArr=Object.entries(outMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const outMax=Math.max(1,...outArr.map(x=>x[1]));
  const outBars=outArr.map(([k,v])=>`<div class="bar out"><div class="top"><b>${k}</b><span>${BRL0(v)}</span></div><div class="track"><div style="width:${v/outMax*100}%"></div></div></div>`).join('');

  const vlist=(DB.vendas||[]).map((v,i)=>({...v,_i:i})).sort((a,b)=>(b.data||'').localeCompare(a.data||''));

      <div class="amt" style="color:var(--green)">${BRL0(v.valor)}</div></div>`).join('')
    : '<div class="empty">Sem vendas registradas.<br>Toque em <b>Registrar vendas</b> e coloque o total que o Consumer mostra.</div>';

  // Resultado da operação (regime de caixa)
  const lucroOp = c.lucroOp;         // receita de venda recebida − custos de operar

  const difVendaCaixa = Math.max(0, vendasReais - c.recebido);

  document.getElementById('v-metas').innerHTML=`

      <div class="big" style="color:${lucro?'var(--green)':'var(--red)'}">${lucro?'+':'−'}${BRL0(Math.abs(lucroOp))}</div>
      <div class="cs">Entrou de venda ${BRL0(c.receitaVenda)} − custos de operar ${BRL0(c.custosOp)}</div>
      <div class="cs" style="margin-top:8px;font-weight:700;color:${lucro?'var(--green)':'var(--red)'}">${lucro?'✓ A operação em si está saudável':'⚠ A operação está no vermelho'}</div>
    </div>

    <div class="sec-h" style="margin-top:22px"><h2>Metas de vendas</h2><button class="linkbtn" id="editMetas">editar</button></div>
    
    <div class="big-card" style="margin-bottom:14px">
      <div class="k">Vendas registradas</div>
      <div class="big" style="color:var(--brand)">${BRL0(vendasReais)}</div>
      
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">

    const boa=prompt('Meta boa (R$):', DB.meta?DB.meta.boa:109315);

    const extraordinaria=prompt('Meta extraordinária (R$):', DB.meta?DB.meta.extraordinaria:120000);

    const mextra=parseFloat(String(extraordinaria).replace(/\./g,'').replace(',','.'))||0;
    
    if(mmin>0 && mboa>0 && mextra>0){

      DB.meta.boa=mboa;

      await save();
      renderMetas();
    }
  };

async function saveVenda(){

function closeSheet(){ document.getElementById('scrim').classList.remove('on'); document.getElementById('sheet').classList.remove('on'); }
function renderSheet(){
  const L=DB.listas,t=form.tipo;
  const contaOpts=L.contas.map(c=>`<option ${form.conta===c?'selected':''}>${c}</option>`).join('');
  const origemOpts=L.contas.map(c=>`<option ${form.contaOrigem===c?'selected':''}>${c}</option>`).join('');
  const catOpts='<option value="">— categoria —</option>'+L.categorias.map(c=>`<option ${form.categoria===c?'selected':''}>${c}</option>`).join('');
  const formaOpts=['Pix','Dinheiro','Cartão','Débito','Boleto','Transferência'].map(f=>`<option ${form.forma===f?'selected':''}>${f}</option>`).join('');
  const curVal=form.tipo==='Entrada'?form.entrada:form.tipo==='Saída'?form.saida:(form.entrada||form.saida);

    </div>

    ${t==='Transferência'?`<div class="two"><div class="field"><label>De</label><select id="f-origem">${origemOpts}</select></div>
      <div class="field"><label>Para</label><select id="f-conta">${contaOpts}</select></div></div>`
      :`<div class="field"><label>Conta</label><select id="f-conta">${contaOpts}</select></div>`}
    ${t!=='Transferência'?`<div class="two"><div class="field"><label>Categoria</label><select id="f-cat">${catOpts}</select></div>
      <div class="field"><label>Forma</label><select id="f-forma">${formaOpts}</select></div></div>`:''}
    <div class="two"><div class="field"><label>Data</label><input id="f-data" type="date" value="${form.data}"></div>
      ${t==='Saída'?`<div class="field"><label>Situação</label><div class="pago-tog">
        <button data-pago="Pago" class="${form.pago==='Pago'?'on':''}">Pago</button>
        <button data-pago="Pendente" class="${form.pago!=='Pago'?'on':''}">Pendente</button></div></div>`:'<div class="field"></div>'}</div>
    <div class="field"><label>Descrição</label><input id="f-desc" type="text" placeholder="ex: Açougue semanal" value="${(form.desc||'').replace(/"/g,'&quot;')}"></div>
    <button class="save" id="f-save">${form._edit!=null?'Salvar alterações':'Salvar lançamento'}</button>
    ${form._edit!=null?'<button class="del" id="f-del">Excluir lançamento</button>':''}`;
  document.querySelectorAll('#sheet .seg button').forEach(b=>b.onclick=()=>{syncForm();form.tipo=b.dataset.tipo;renderSheet();});
  document.querySelectorAll('#sheet .pago-tog button').forEach(b=>b.onclick=()=>{syncForm();form.pago=b.dataset.pago;renderSheet();});
  document.getElementById('f-save').onclick=saveForm;
  const del=document.getElementById('f-del'); if(del)del.onclick=deleteForm;
}
function syncForm(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  const v=g('f-val'); if(v!==undefined){
    // Aceita tanto vírgula quanto ponto como decimal
    // Remove pontos de milhar (ex: 1.206,50) e troca vírgula por ponto
    let raw=String(v).trim();
    // Se tem vírgula: remove pontos de milhar e troca vírgula por ponto
    if(raw.includes(',')){ raw=raw.replace(/\./g,'').replace(',','.'); }
    const n=parseFloat(raw)||0;
    if(form.tipo==='Entrada'){form.entrada=n;form.saida=0;}else if(form.tipo==='Saída'){form.saida=n;form.entrada=0;}else{form.entrada=n;form.saida=0;}}
  if(g('f-conta')!==undefined)form.conta=g('f-conta');
  if(g('f-origem')!==undefined)form.contaOrigem=g('f-origem');
  if(g('f-cat')!==undefined)form.categoria=g('f-cat');
  if(g('f-forma')!==undefined)form.forma=g('f-forma');
  if(g('f-data')!==undefined)form.data=g('f-data');
  if(g('f-desc')!==undefined)form.desc=g('f-desc');
}
async function saveForm(){
  syncForm();
  const v=form.tipo==='Entrada'?form.entrada:form.tipo==='Saída'?form.saida:(form.entrada||form.saida);
  if(!v){toast('Digite um valor');return;}
  if(form.tipo==='Transferência'&&form.contaOrigem===form.conta){toast('Origem e destino iguais');return;}
  const rec={data:form.data,tipo:form.tipo,conta:form.conta,contaOrigem:form.contaOrigem||'',categoria:form.categoria||'',
    forma:form.forma||'',desc:form.desc||'',entrada:form.entrada||0,saida:form.saida||0,pago:form.tipo==='Saída'?(form.pago||'Pago'):'Pago',obs:form.obs||''};
  if(form._edit!=null)DB.txs[form._edit]=rec; else DB.txs.push(rec);
  await save();closeSheet();toast(form._edit!=null?'Atualizado ✓':'Lançado ✓');refresh();
}
async function deleteForm(){ if(form._edit==null)return; DB.txs.splice(form._edit,1); await save();closeSheet();toast('Excluído');refresh(); }
async function doReset(){ DB=JSON.parse(JSON.stringify(SEED)); await save();toast('Dados restaurados');refresh(); }

async function sendCompraWhatsApp(fornecedorNome){
  const fornecedor=DB.fornecedoresAtivos[fornecedorNome];
  if(!fornecedor) return;
  
  let mensagem='';
  
  // mensagem personalizada por fornecedor
  if(fornecedorNome==='Açougue Rose'){
    mensagem='Bom dia '+fornecedor.nome+'\n\nSepara pra mim por favor\n\n';
  } else if(fornecedorNome==='Massa fina'){
    mensagem='Boa noite\n\n';
  } else if(fornecedorNome==='Mar Frios'){
    mensagem='Bom dia '+fornecedor.nome+' tudo bom?\n\n';
  } else {
    mensagem='Boa noite\n\n';  // padrão pra novos fornecedores
  }
  
  let temPedido=false;
  
  fornecedor.produtos.forEach((p,i)=>{
    const val=document.querySelector(`.compra-qty[data-idx="${i}"]`).value;
    if(val&&parseFloat(val)>0){
      mensagem+=val+' '+p.unidade+' '+p.nome+'\n';
      temPedido=true;
    }
  });
  
  if(!temPedido){toast('Selecione pelo menos um produto');return;}
  
  mensagem+='\nObg';
  
  // Tenta abrir no app nativo do WhatsApp direto (sem modal)
  const nativeUrl='whatsapp://send?phone='+fornecedor.whatsapp+'&text='+encodeURIComponent(mensagem);
  const webUrl='https://wa.me/'+fornecedor.whatsapp+'?text='+encodeURIComponent(mensagem);
  
  // Tenta protocolo nativo
  const iframe=document.createElement('iframe');
  iframe.src=nativeUrl;
  iframe.style.display='none';
  document.body.appendChild(iframe);
  
  // Se app não estiver instalado, abre web depois de 2 segundos
  setTimeout(()=>{
    document.body.removeChild(iframe);
    window.open(webUrl,'_blank');
  },2000);
  
  // limpar campos
  document.querySelectorAll('.compra-qty').forEach(el=>el.value='');
  
  // guardar em DB e salvar
  if(!DB.comprasAtivas) DB.comprasAtivas={};
  DB.comprasAtivas[fornecedorNome]=Array(fornecedor.produtos.length).fill('');
  await save();
  
  toast('Pedido enviado! ✓');
}

  // restaurar o mês

async function confirmCloseMonth(){
  const c=compute();
  const ct=cardsTotal(c);
  
  const monthSnapshot={
    mes:DB.currentMonth.mes,
    dataInicio:DB.currentMonth.dataInicio,
    dataFim:DB.currentMonth.dataFim,
    txs:JSON.parse(JSON.stringify(DB.txs)),
    vendas:JSON.parse(JSON.stringify(DB.vendas||[])),
    cartoes:JSON.parse(JSON.stringify(DB.cartoes)),
    resumo:{
      vendas:c.receitaVenda,
      custos:c.custosOp,
      lucro:c.lucroOp,
      retiradas:c.retiradas,
      divida:ct.divida,
      saldos:JSON.parse(JSON.stringify(c.bal))
    }
  };
  if(!DB.history)DB.history=[];
  DB.history.push(monthSnapshot);
  
  // preparar próximo mês
  const [mes,ano]=DB.currentMonth.mes.split('/');
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let nextIdx=meses.indexOf(mes.charAt(0).toUpperCase()+mes.slice(1).toLowerCase())+1;
  let nextYear=parseInt(ano);
  if(nextIdx>12){nextIdx=1;nextYear+=1;}
  const nextMes=meses[nextIdx-1]+'/'+nextYear;
  
  DB.currentMonth={
    mes:nextMes,
    dataInicio:nextYear+'-'+String(nextIdx).padStart(2,'0')+'-01',
    dataFim:null
  };
  
  // atualizar saldos iniciais com os finais
  DB.contas.forEach(ct=>{ ct.inicial=c.bal[ct.nome]||0; });
  
  // limpar dados do novo mês
  DB.txs=[];
  DB.vendas=[];
  
  await save();
  closeSheet();
  toast('Mês fechado com sucesso! ✓');
  go('historico');
  renderHistorico();
}

let cur='inicio';
function go(v){ cur=v;
  ['inicio','extrato','cartoes','metas','compras','historico'].forEach(x=>document.getElementById('v-'+x).classList.toggle('hidden',x!==v));
  document.querySelectorAll('.nav button[data-nav]').forEach(b=>b.classList.toggle('on',b.dataset.nav===v));
  refresh(); window.scrollTo(0,0);
}
function refresh(){ if(cur==='inicio')renderInicio();else if(cur==='extrato')renderExtrato();else if(cur==='cartoes')renderCartoes();else if(cur==='metas')renderMetas();else if(cur==='compras')renderCompras();else if(cur==='historico')renderHistorico(); }
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),1800);}

document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]'); if(nav){go(nav.dataset.nav);return;}
  const fb=e.target.closest('[data-filt]'); if(fb){filt=fb.dataset.filt;renderExtrato();return;}
  const ed=e.target.closest('[data-edit]'); if(ed){openSheet(parseInt(ed.dataset.edit));return;}
  const vd=e.target.closest('[data-venda]'); if(vd){openVendaSheet(parseInt(vd.dataset.venda));return;}
  const md=e.target.closest('[data-mes]'); if(md){openMonthDetail(parseInt(md.dataset.mes));return;}
});
document.getElementById('fab').onclick=()=>openSheet(null);
document.getElementById('scrim').onclick=closeSheet;

(async()=>{
  document.getElementById('todayLbl').textContent=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  await load(); go('inicio');
  setTimeout(()=>{const s=document.getElementById('splash');if(s)s.classList.add('gone');setTimeout(()=>s&&s.remove(),600);},1150);
})();
</script>
